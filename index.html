<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#14181d">
<title>小六壬 掐指占卜</title>
<meta property="og:title" content="小六壬 掐指占卜">
<meta property="og:description" content="誠心一問，靜心默念所問之事，點按印璽即刻起卦">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
:root{
  --ink:#14181d;
  --ink-2:#1d2329;
  --paper:#ede6d6;
  --paper-dim:#c9c0aa;
  --seal:#a92a2a;
  --seal-bright:#c53a3a;
  --gold:#c9a24d;
  --gold-dim:#8a743a;
  --line:#3a4048;
  --jade:#4c7a6b;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  background:
    radial-gradient(ellipse at 20% -10%, #232a32 0%, transparent 55%),
    radial-gradient(ellipse at 100% 110%, #23201a 0%, transparent 50%),
    var(--ink);
  color:var(--paper);
  font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;
  min-height:100vh;
  display:flex;
  justify-content:center;
  padding:0 0 60px;
}
.app{
  width:100%;
  max-width:480px;
  min-height:100vh;
  position:relative;
  padding:36px 22px 40px;
}
/* texture */
.app::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  opacity:.05;
  background-image:
    repeating-linear-gradient(0deg,#fff 0 1px,transparent 1px 3px);
  mix-blend-mode:overlay;
}
header{text-align:center;margin-bottom:28px;}
.eyebrow{
  font-size:12px;
  letter-spacing:.32em;
  color:var(--gold);
  text-transform:uppercase;
  margin-bottom:10px;
  font-weight:500;
}
h1{
  font-family:'Noto Serif TC',serif;
  font-weight:900;
  font-size:34px;
  margin:0 0 8px;
  letter-spacing:.08em;
  color:var(--paper);
  text-shadow:0 0 24px rgba(201,162,77,.18);
}
.sub{
  font-size:13px;
  color:var(--paper-dim);
  letter-spacing:.05em;
}
.rule{
  width:64px;height:1px;margin:18px auto 0;
  background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);
}

.notice{
  display:flex;
  align-items:flex-start;
  gap:8px;
  background:rgba(201,162,77,.08);
  border:1px solid var(--gold-dim);
  border-radius:10px;
  padding:11px 14px;
  margin-bottom:26px;
  font-size:12.5px;
  line-height:1.7;
  color:var(--paper-dim);
}
.notice .mark{color:var(--gold);font-weight:700;flex-shrink:0;}
.notice b{color:var(--gold);font-weight:500;}

/* seal stamp button */
.stage{
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px 0 8px;
}
.stamp-wrap{position:relative;width:180px;height:180px;}
.stamp{
  width:180px;height:180px;
  border-radius:14px;
  background:linear-gradient(160deg,var(--seal-bright),var(--seal) 60%,#7e1e1e);
  border:2px solid #d8946b;
  outline:1px solid rgba(0,0,0,.25);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  box-shadow:
    0 18px 40px -12px rgba(169,42,42,.55),
    inset 0 0 0 6px rgba(237,230,214,.06),
    inset 0 2px 8px rgba(255,255,255,.15);
  transition:transform .15s ease, box-shadow .15s ease;
  user-select:none;
  position:relative;
  overflow:hidden;
}
.stamp::after{
  content:"";
  position:absolute;inset:10px;
  border:1px solid rgba(237,230,214,.35);
  border-radius:8px;
  pointer-events:none;
}
.stamp span{
  font-family:'Noto Serif TC',serif;
  font-weight:900;
  font-size:40px;
  color:var(--paper);
  letter-spacing:.12em;
  writing-mode:vertical-rl;
  text-shadow:0 2px 4px rgba(0,0,0,.35);
}
.stamp:active{transform:scale(.94) translateY(2px);}
.stamp.stamping{animation:stampdown .5s ease;}
@keyframes stampdown{
  0%{transform:scale(1) translateY(0);}
  35%{transform:scale(.88) translateY(10px);}
  55%{transform:scale(.92) translateY(6px);}
  100%{transform:scale(1) translateY(0);}
}
.stamp-glow{
  position:absolute;inset:-14px;
  border-radius:20px;
  background:radial-gradient(circle,rgba(197,58,58,.5),transparent 70%);
  opacity:0;
  transition:opacity .4s ease;
  pointer-events:none;
}
.stamp-glow.on{opacity:1;animation:pulse 1.6s ease-out infinite;}
@keyframes pulse{0%{transform:scale(.9);opacity:.7;}100%{transform:scale(1.25);opacity:0;}}
.cta-label{margin-top:18px;font-size:14px;color:var(--paper-dim);letter-spacing:.1em;}
.hint{font-size:12px;color:var(--gold-dim);margin-top:6px;text-align:center;line-height:1.7;}

/* result sections */
.reveal{
  max-height:0;
  overflow:hidden;
  opacity:0;
  transition:max-height .6s ease, opacity .5s ease;
}
.reveal.open{max-height:4000px;opacity:1;}

.card{
  background:linear-gradient(165deg,var(--ink-2),#181d23);
  border:1px solid var(--line);
  border-radius:12px;
  padding:18px 18px;
  margin-top:16px;
  position:relative;
}
.card-title{
  font-size:12px;
  letter-spacing:.22em;
  color:var(--gold);
  text-transform:uppercase;
  margin-bottom:12px;
  display:flex;
  align-items:center;
  gap:8px;
}
.card-title::before{content:"";width:14px;height:1px;background:var(--gold-dim);}

.time-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.time-item{font-size:13px;color:var(--paper-dim);}
.time-item b{display:block;font-size:16px;color:var(--paper);font-weight:500;margin-top:2px;font-family:'Noto Serif TC',serif;}

.flow-line{
  margin-top:16px;
  padding-top:14px;
  border-top:1px dashed var(--line);
  text-align:center;
  font-family:'Noto Serif TC',serif;
  font-size:17px;
  font-weight:700;
  letter-spacing:.04em;
  color:var(--paper);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  flex-wrap:wrap;
}
.flow-line .arrow{color:var(--gold);font-size:14px;font-weight:400;}
.flow-line .final{color:var(--seal-bright);}

.step{
  padding:14px 0;
  border-top:1px dashed var(--line);
}
.step:first-child{border-top:none;padding-top:2px;}
.step-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
.step-name{font-size:13px;color:var(--gold);letter-spacing:.08em;}
.step-formula{font-size:12px;color:var(--paper-dim);font-family:'Noto Serif TC',serif;}
.dots{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
.dot{
  flex:1;
  min-width:44px;
  text-align:center;
  padding:7px 2px;
  border-radius:7px;
  font-size:12px;
  border:1px solid var(--line);
  color:var(--paper-dim);
  background:rgba(255,255,255,.02);
  transition:all .25s ease;
}
.dot.active{
  border-color:var(--seal-bright);
  background:rgba(197,58,58,.18);
  color:var(--paper);
  font-weight:700;
  transform:translateY(-2px);
}
.dot.final{
  border-color:var(--gold);
  background:rgba(201,162,77,.2);
  color:var(--gold);
  box-shadow:0 0 12px rgba(201,162,77,.25);
}
.step-result{margin-top:8px;font-size:13px;color:var(--paper);}
.step-result em{color:var(--seal-bright);font-style:normal;font-weight:700;}

/* final result */
.result-card{
  margin-top:22px;
  border-radius:16px;
  padding:2px;
  background:linear-gradient(160deg,var(--gold),var(--seal) 60%,var(--gold-dim));
}
.result-inner{
  background:linear-gradient(165deg,#171b20,#12151a);
  border-radius:14px;
  padding:26px 22px 22px;
  text-align:center;
}
.result-tag{
  display:inline-block;
  font-size:11px;
  letter-spacing:.2em;
  color:var(--gold);
  border:1px solid var(--gold-dim);
  padding:3px 12px;
  border-radius:20px;
  margin-bottom:14px;
}
.result-name{
  font-family:'Noto Serif TC',serif;
  font-weight:900;
  font-size:46px;
  letter-spacing:.08em;
  margin:0 0 4px;
}
.result-luck{font-size:14px;letter-spacing:.15em;margin-bottom:18px;}
.luck-吉{color:#7fbf9e;} .luck-大吉{color:#7fbf9e;}
.luck-凶{color:#d97b7b;} .luck-大凶{color:#d97b7b;}

.meta-row{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:20px;
}
.meta-pill{
  font-size:12px;
  color:var(--paper-dim);
  border:1px solid var(--line);
  border-radius:20px;
  padding:5px 12px;
}
.meta-pill b{color:var(--paper);font-weight:500;}

.poem{
  font-family:'Noto Serif TC',serif;
  font-size:15px;
  line-height:2.1;
  color:var(--paper);
  letter-spacing:.04em;
  padding:16px 10px;
  border-top:1px solid var(--line);
  border-bottom:1px solid var(--line);
  margin-bottom:18px;
}
.summary{
  font-size:13px;
  color:var(--paper-dim);
  line-height:1.9;
  margin-bottom:18px;
  text-align:left;
}
.matters{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  text-align:left;
}
.matter{
  background:rgba(255,255,255,.03);
  border:1px solid var(--line);
  border-radius:10px;
  padding:10px 12px;
}
.matter-k{font-size:11px;color:var(--gold);letter-spacing:.1em;margin-bottom:4px;}
.matter-v{font-size:12.5px;color:var(--paper-dim);line-height:1.6;}

.again-btn{
  margin-top:24px;
  width:100%;
  background:transparent;
  border:1px solid var(--gold-dim);
  color:var(--gold);
  font-family:'Noto Sans TC',sans-serif;
  font-size:13px;
  letter-spacing:.15em;
  padding:13px;
  border-radius:10px;
  cursor:pointer;
  transition:all .2s;
}
.again-btn:active{background:rgba(201,162,77,.1);}

footer{
  text-align:center;
  margin-top:38px;
  font-size:11px;
  color:var(--line);
  letter-spacing:.1em;
}
footer .brand{color:var(--paper-dim);}

@media (min-width:520px){
  .app{padding-top:56px;}
}
</style>
</head>

    </div>

    <button class="again-btn" id="againBtn">重 新 誠 心 一 問</button>
  </div>

  <footer>本占卜依傳統小六壬掐指之法起宮，僅供參考<br><span class="brand">大帥集團開運坊</span></footer>
</div>

/* ===================== 農曆換算 ===================== */
function newYearDate(year){
  const idx = year - LUNAR_TABLE_START_YEAR;
  const row = LUNAR_TABLE[idx];
  return new Date(year, row[1]-1, row[2]);
}
function solar2lunar(y,m,d){
  const target = new Date(y,m-1,d);
  let lunarYear = y;
  let start = newYearDate(y);
  if (target < start){
    lunarYear = y - 1;
    start = newYearDate(lunarYear);
  }
  const idx = lunarYear - LUNAR_TABLE_START_YEAR;
  const row = LUNAR_TABLE[idx];
  const lp = row[0], mask = row[3];
  let months = [];
  let bit = 0;
  for (let mm=1; mm<=12; mm++){
    const len = ((mask>>bit)&1) ? 30:29;
    months.push({m:mm, leap:false, len});
    bit++;
    if (lp===mm){
      const len2 = ((mask>>bit)&1)?30:29;
      months.push({m:mm, leap:true, len:len2});
      bit++;
    }
  }
  let dayOffset = Math.round((target-start)/86400000);
  for (const mo of months){
    if (dayOffset < mo.len){
      return {year:lunarYear, month:mo.m, leap:mo.leap, day:dayOffset+1};
    }
    dayOffset -= mo.len;
  }
  return null;
}

/* ===================== 起宮運算 ===================== */
function calcPalace(startIdx, count){
  // startIdx: 1-6, count: 順數步數(含起點本身為第1步)
  return ((startIdx - 1 + count - 1) % 6) + 1;
}
function shichenIndexFromHour(hour){
  return Math.floor(((hour+1)%24)/2) + 1;
}

/* ===================== UI 互動 ===================== */
// 驗證期先保留「起宮過程」區塊供核對；日後確認計算皆無誤後，將此改為 false 即可隱藏該區塊，不需再動版面結構
const SHOW_PROCESS = true;

const stampBtn = document.getElementById('stampBtn');
const stampGlow = document.getElementById('stampGlow');
const revealArea = document.getElementById('revealArea');
const ctaLabel = document.getElementById('ctaLabel');
const againBtn = document.getElementById('againBtn');
const processCard = document.getElementById('processCard');
if (!SHOW_PROCESS && processCard) processCard.style.display = 'none';

function pad(n){ return n<10 ? '0'+n : ''+n; }

function runDivination(){
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth()+1, d = now.getDate();
  const hour = now.getHours(), min = now.getMinutes();

  const lunar = solar2lunar(y,m,d);
  const shiIdx = shichenIndexFromHour(hour);

  // 三重起宮
  const monthPalace = calcPalace(1, lunar.month);          // 大安起正月，順數至農曆月份
  const dayPalace   = calcPalace(monthPalace, lunar.day);  // 月宮起初一，順數至農曆日期
  const hourPalace  = calcPalace(dayPalace, shiIdx);        // 日宮起子時，順數至時辰

  const monthName = (lunar.leap?'閏':'') + CN_NUM[lunar.month] + '月';
  const dayName = lunarDayName(lunar.day);

  document.getElementById('gDate').textContent = `${y}年${pad(m)}月${pad(d)}日`;
  document.getElementById('lDate').textContent = `${lunar.year}年 ${monthName}${dayName}日`;
  document.getElementById('shichen').textContent = `${SHICHEN_NAME[shiIdx-1]}時（${SHICHEN_RANGE[shiIdx-1]}）`;
  document.getElementById('clockTime').textContent = `${pad(hour)}:${pad(min)}`;

  const arrow = '<span class="arrow">→</span>';
  document.getElementById('flowLine').innerHTML =
    `${PALACES[monthPalace-1]}${arrow}${PALACES[dayPalace-1]}${arrow}<span class="final">${PALACES[hourPalace-1]}</span>`;

  if (SHOW_PROCESS){
    const stepsArea = document.getElementById('stepsArea');
    stepsArea.innerHTML = '';

    const steps = [
      {label:'起月', formula:`大安起正月，順數至農曆${monthName}`, start:1, count:lunar.month, result:monthPalace},
      {label:'起日', formula:`${PALACES[monthPalace-1]}起初一，順數至${dayName}日`, start:monthPalace, count:lunar.day, result:dayPalace},
      {label:'起時', formula:`${PALACES[dayPalace-1]}起子時，順數至${SHICHEN_NAME[shiIdx-1]}時`, start:dayPalace, count:shiIdx, result:hourPalace}
    ];

    steps.forEach((s, i)=>{
      const div = document.createElement('div');
      div.className = 'step';
      const dotsHtml = PALACES.map((p, pi)=>{
        const idx = pi+1;
        const isResult = idx === s.result;
        const cls = isResult ? 'dot final' : 'dot';
        return `<div class="${cls}">${p}</div>`;
      }).join('');
      div.innerHTML = `
        <div class="step-head"><span class="step-name">${i+1}. ${s.label}</span></div>
        <div class="step-formula">${s.formula}</div>
        <div class="dots">${dotsHtml}</div>
        <div class="step-result">落於 <em>「${PALACES[s.result-1]}」</em>宮</div>
      `;
      stepsArea.appendChild(div);
    });
  }

  const finalName = PALACES[hourPalace-1];
  const info = PALACE_INFO[finalName];

  document.getElementById('resultName').textContent = finalName;
  const luckEl = document.getElementById('resultLuck');
  luckEl.textContent = '「' + info.luck + '」— ' + info.deity;
  luckEl.className = 'result-luck luck-' + info.luck;

  document.getElementById('metaRow').innerHTML = `
    <div class="meta-pill">五行 <b>${info.wuxing}</b></div>
    <div class="meta-pill">方位 <b>${info.dir}</b></div>
  `;
  document.getElementById('resultPoem').textContent = info.poem;
  document.getElementById('resultSummary').textContent = info.summary;

  const mattersGrid = document.getElementById('mattersGrid');
  mattersGrid.innerHTML = Object.entries(info.matters).map(([k,v])=>`
    <div class="matter"><div class="matter-k">${k}</div><div class="matter-v">${v}</div></div>
  `).join('');

  revealArea.classList.add('open');
  setTimeout(()=>{
    document.querySelector('.result-card').scrollIntoView({behavior:'smooth', block:'nearest'});
  }, 350);
}

stampBtn.addEventListener('click', ()=>{
  stampBtn.classList.remove('stamping');
  void stampBtn.offsetWidth;
  stampBtn.classList.add('stamping');
  stampGlow.classList.add('on');
  ctaLabel.textContent = '印璽已下，卦象顯現中…';
  setTimeout(()=>{
    runDivination();
    ctaLabel.textContent = '卦象已現，如下所示';
  }, 260);
});

againBtn.addEventListener('click', ()=>{
  revealArea.classList.remove('open');
  stampGlow.classList.remove('on');
  ctaLabel.textContent = '點按印璽，即刻起卦';
  window.scrollTo({top:0, behavior:'smooth'});
});
</script>
